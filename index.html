<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUT Drammen - Driftsklar</title>
    <style>
        :root { --primary: #2563eb; --success: #059669; --purple: #8b5cf6; --bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; }
        .kort { width: 100%; max-width: 480px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        h1 { color: #1e3a8a; margin: 0; font-size: 22px; }
        label { font-weight: 700; display: block; margin: 15px 0 5px; font-size: 11px; color: #475569; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; background: white; box-sizing: border-box; }
        .btn-quick { background: var(--purple); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #7c3aed; }
        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: #94a3b8; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px dashed #cbd5e1; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { background: #fff; border: 2px solid #e2e8f0; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; color: #475569; font-size: 13px; }
        
        /* Fargen som viser hva som er valgt */
        .btn.active { background-color: #2563eb !important; color: white !important; border-color: #1e40af !important; }
        
        .tema-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        #temaSection { display: none; margin-top: 10px; padding: 15px; background: #f1f5f9; border-radius: 10px; border: 1px solid #e2e8f0; }
        .save-btn { background: var(--success); color: white; border: none; width: 100%; padding: 20px; border-radius: 14px; font-size: 18px; font-weight: 800; margin-top: 25px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="kort">
    <div class="header"><h1>OUT Drammen 🚶‍♂️</h1></div>
    
    <label>1. Velg Sted</label>
    <select id="bydel">
        <option value="Bragernes">Bragernes</option>
        <option value="Fjell">Fjell</option>
        <option value="Gulskogen">Gulskogen</option>
        <option value="Konnerud">Konnerud</option>
        <option value="Krokstadelva">Krokstadelva</option>
        <option value="Mjøndalen">Mjøndalen</option>
        <option value="Solbergelva">Solbergelva</option>
        <option value="Strømsø">Strømsø</option>
        <option value="Åskollen">Åskollen</option>
        <option value="Åssiden">Åssiden</option>
    </select>

    <button type="button" class="btn-quick" onclick="hurtigLagre()">📍 HURTIG-REG (Kun Sted)</button>

    <div class="divider">Full registrering</div>

    <label>Arena</label>
    <select id="lokasjon">
        <option value="OPPSØKENDE UTE">OPPSØKENDE UTE</option>
        <option value="G60">G60</option>
        <option value="FELLESVERKET">FELLESVERKET</option>
        <option value="NEON">NEON</option>
        <option value="DOWN UNDER">DOWN UNDER</option>
        <option value="UNDERGRUNN">UNDERGRUNN</option>
        <option value="SKATTEKAMMERET">SKATTEKAMMERET</option>
        <option value="NØSTEDHALLEN">NØSTEDHALLEN</option>
    </select>

    <label>Type treff</label>
    <div class="grid">
        <button type="button" class="btn t-btn" onclick="velgType('TREFF', this)">TREFF</button>
        <button type="button" class="btn t-btn" onclick="velgType('SAMTALE', this)">SAMTALE</button>
    </div>

    <div id="temaSection">
        <label>Tema (Velg flere)</label>
        <div class="tema-grid">
            <button type="button" class="btn tema-btn" onclick="velgTema('Alkohol', this)">Alkohol</button>
            <button type="button" class="btn tema-btn" onclick="velgTema('Bolig', this)">Bolig</button>
            <button type="button" class="btn tema-btn" onclick="velgTema('Cannabis', this)">Cannabis</button>
            <button type="button" class="btn tema-btn" onclick="velgTema('Familie', this)">Familie</button>
            <button type="button" class="btn tema-btn" onclick="velgTema('Forhold', this)">Forhold</button>
            <button type="button" class="btn tema-btn" onclick="velgTema('Fremtid', this)">Fremtid</button>
            <button type="button" class="btn tema-btn" onclick="velgTema('Fysisk helse', this)">Fysisk helse</button>
            <button type="button" class="btn tema-btn" onclick="velgTema('Psykisk helse', this)">Psykisk helse</button>
            <button type="button" class="btn tema-btn" onclick="velgTema('Kriminalitet', this)">Kriminalitet</button>
            <button type="button" class="btn tema-btn" onclick="velgTema('Rusmidler', this)">Rusmidler</button>
            <button type="button" class="btn tema-btn" onclick="velgTema('Økonomi', this)">Økonomi</button>
            <button type="button" class="btn tema-btn" onclick="velgTema('Vold', this)">Vold</button>
            <button type="button" class="btn tema-btn" onclick="velgTema('Skole', this)">Skole</button>
            <button type="button" class="btn tema-btn" onclick="velgTema('Informasjonsarbeid', this)">Informasjonsarbeid</button>
            <button type="button" class="btn tema-btn" onclick="velgTema('Fritid', this)">Fritid</button>
        </div>
    </div>

    <label>Kjønn</label>
    <div class="grid-3">
        <button type="button" class="btn k-btn" onclick="velgKjonn('GUTT', this)">GUTT</button>
        <button type="button" class="btn k-btn" onclick="velgKjonn('JENTE', this)">JENTE</button>
        <button type="button" class="btn k-btn" onclick="velgKjonn('ANNET', this)">ANNET</button>
    </div>

    <label>Alder</label>
    <div class="grid">
        <button type="button" class="btn a-btn" onclick="velgAlder('B-SKOLE', this)">B-SKOLE</button>
        <button type="button" class="btn a-btn" onclick="velgAlder('U-SKOLE', this)">U-SKOLE</button>
        <button type="button" class="btn a-btn" onclick="velgAlder('VGS', this)">VGS</button>
        <button type="button" class="btn a-btn" onclick="velgAlder('20-25 ÅR', this)">20-25 ÅR</button>
    </div>

    <label>Antall ungdommer</label>
    <input type="number" id="antall" value="1">

    <button type="button" class="save-btn" id="btnLagre" onclick="lagreFull()">LAGRE REGISTRERING</button>
</div>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(sent){alert('Innsending vellykket!'); location.reload();}"></iframe>

<script>
    var valgtType = "";
    var valgtKjonn = "";
    var valgtAlder = "";
    var valgteTemaer = [];
    var sent = false;

    function velgType(v, el) {
        var btns = document.getElementsByClassName('t-btn');
        for(var i=0; i<btns.length; i++) btns[i].classList.remove('active');
        el.classList.add('active'); valgtType = v;
        document.getElementById('temaSection').style.display = (v === 'SAMTALE' ? 'block' : 'none');
    }

    function velgKjonn(v, el) {
        var btns = document.getElementsByClassName('k-btn');
        for(var i=0; i<btns.length; i++) btns[i].classList.remove('active');
        el.classList.add('active'); valgtKjonn = v;
    }

    function velgAlder(v, el) {
        var btns = document.getElementsByClassName('a-btn');
        for(var i=0; i<btns.length; i++) btns[i].classList.remove('active');
        el.classList.add('active'); valgtAlder = v;
    }

    function velgTema(v, el) {
        if (el.classList.contains('active')) {
            el.classList.remove('active');
            valgteTemaer = valgteTemaer.filter(function(t) { return t !== v; });
        } else {
            el.classList.add('active');
            valgteTemaer.push(v);
        }
    }

    function hurtigLagre() {
        var sted = document.getElementById('bydel').value;
        if(confirm("Hurtig-lagre kun tilstedeværelse i " + sted + "?")) {
            sendTilGoogle(sted, "", "", "", "", "", []);
        }
    }

    function lagreFull() {
        var feil = [];
        if (!valgtType) feil.push("- Type treff");
        if (!valgtKjonn) feil.push("- Kjønn");
        if (!valgtAlder) feil.push("- Alder");
        if (valgtType === 'SAMTALE' && valgteTemaer.length === 0) feil.push("- Minst ett tema");

        if (feil.length > 0) {
            alert("Vennligst velg:\n" + feil.join("\n"));
            return;
        }

        sendTilGoogle(
            document.getElementById('bydel').value,
            document.getElementById('lokasjon').value,
            valgtType,
            document.getElementById('antall').value,
            valgtAlder,
            valgtKjonn,
            valgteTemaer
        );
    }

    function sendTilGoogle(bydel, arena, type, ant, alder, kjonn, temaer) {
        sent = true;
        var btn = document.getElementById('btnLagre');
        btn.disabled = true; btn.innerHTML = "SENDER...";

        var form = document.createElement('form');
        form.method = 'POST';
        form.action = 'https://docs.google.com/forms/d/e/1FAIpQLSeOi1N3cOL5qKiFpv-nczOc7obqEFHFLkQV4FnMOj0wZFk8Jw/formResponse';
        form.target = 'hidden_iframe';

        var data = [
            {n: "entry.842257148", v: bydel},
            {n: "entry.214146964", v: arena},
            {n: "entry.1473666377", v: type},
            {n: "entry.1346284831", v: ant},
            {n: "entry.1163056236", v: alder},
            {n: "entry.1511233883", v: kjonn}
        ];

        data.forEach(function(item) {
            if(item.v !== "") {
                var inp = document.createElement('input');
                inp.type = 'hidden'; inp.name = item.n; inp.value = item.v;
                form.appendChild(inp);
            }
        });

        temaer.forEach(function(t) {
            var inp = document.createElement('input');
            inp.type = 'hidden'; inp.name = "entry.1946658553"; inp.value = t;
            form.appendChild(inp);
        });

        document.body.appendChild(form);
        form.submit();
    }
</script>
</body>
</html>
