<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OUT Drammen</title>
    <style>
        :root { --primary: #2563eb; --success: #059669; --purple: #8b5cf6; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .kort { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 15px; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
        h1 { color: #1e3a8a; font-size: 24px; margin: 0; }
        label { font-weight: 700; display: block; margin: 15px 0 5px; font-size: 11px; color: #475569; text-transform: uppercase; }
        select, input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; background: #fff; box-sizing: border-box; }
        select[multiple] { height: auto; min-height: 120px; padding: 5px; }
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #94a3b8; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px dashed #cbd5e1; }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }
        .btn-quick { background: var(--purple); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 14px; box-shadow: 0 4px 0 #7c3aed; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        .btn { background: #fff; border: 2px solid #e2e8f0; padding: 12px 5px; border-radius: 10px; font-weight: 700; color: #475569; font-size: 12px; cursor: pointer; -webkit-appearance: none; }
        .btn.active { background-color: var(--primary) !important; color: white !important; border-color: #1e40af !important; }
        #temaSection { display: none; margin-top: 10px; padding: 10px; background: #f1f5f9; border-radius: 10px; border: 1px solid #e2e8f0; }
        .save-btn { background: var(--success); color: white; border: none; width: 100%; padding: 18px; border-radius: 14px; font-size: 16px; font-weight: 800; margin-top: 20px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="kort">
    <div class="header"><h1>OUT Drammen 🚶‍♂️</h1></div>
    
    <label>1. VELG STED</label>
    <select id="bydel">
        <option value="Bragernes">Bragernes</option>
        <option value="Fjell">Fjell</option>
        <option value="Gulskogen">Gulskogen</option>
        <option value="Konnerud">Konnerud</option>
        <option value="Krogstadelva">Krogstadelva</option>
        <option value="Mjøndalen">Mjøndalen</option>
        <option value="Solbergelva">Solbergelva</option>
        <option value="Strømsø">Strømsø</option>
        <option value="Åskollen">Åskollen</option>
        <option value="Åssiden">Åssiden</option>
    </select>

    <button type="button" class="btn-quick" style="margin-top:15px" onclick="hurtigLagre()">📍 TILSTEDEVÆRELSE I OMRÅDET</button>

    <div class="divider">ELLER FULL REGISTRERING</div>

    <label>ARENA / UNGDOMSKLUBB</label>
    <select id="lokasjon">
        <option value="OPPSØKENDE UTE">OPPSØKENDE UTE</option>
        <option value="G60">G60</option>
        <option value="FELLESVERKET">FELLESVERKET</option>
        <option value="NEON">NEON</option>
        <option value="DOWN UNDER">DOWN UNDER</option>
        <option value="UNDERGRUNN">UNDERGRUNN</option>
        <option value="SKATTEKAMMERET">SKATTEKAMMERET</option>
        <option value="NØSTEDHALLEN">NØSTEDHALLEN</option>
    </select>

    <label>TYPE TREFF</label>
    <div class="grid">
        <button type="button" class="btn t-btn" onclick="velg('t', 'TREFF', this)">TREFF</button>
        <button type="button" class="btn t-btn" onclick="velg('t', 'SAMTALE', this)">SAMTALE</button>
    </div>

    <div id="temaSection">
        <label>TEMA (Hold inne for å velge flere)</label>
        <select id="temaValg" multiple>
            <option value="Psykisk helse">Psykisk helse</option>
            <option value="Rusmidler">Rusmidler</option>
            <option value="Alkohol">Alkohol</option>
            <option value="Familie">Familie</option>
            <option value="Forhold">Forhold/Venner</option>
            <option value="Kriminalitet">Kriminalitet</option>
            <option value="Økonomi">Økonomi</option>
            <option value="Skole/Jobb">Skole/Jobb</option>
            <option value="Fritid">Fritid</option>
        </select>
    </div>

    <label>KJØNN</label>
    <div class="grid grid-3">
        <button type="button" class="btn k-btn" onclick="velg('k', 'JENTE', this)">JENTE</button>
        <button type="button" class="btn k-btn" onclick="velg('k', 'GUTT', this)">GUTT</button>
        <button type="button" class="btn k-btn" onclick="velg('k', 'ANNET', this)">ANNET</button>
    </div>

    <label>ALDER</label>
    <div class="grid grid-3">
        <button type="button" class="btn a-btn" onclick="velg('a', 'B-SKOLE', this)">B-SKOLE</button>
        <button type="button" class="btn a-btn" onclick="velg('a', 'U-SKOLE', this)">U-SKOLE</button>
        <button type="button" class="btn a-btn" onclick="velg('a', 'VGS', this)">VGS</button>
    </div>
    <button type="button" class="btn a-btn" style="width:100%; margin-top:8px" onclick="velg('a', '20-25 ÅR', this)">20-25 ÅR</button>

    <label>ANTALL UNGDOMMER</label>
    <input type="number" id="antall" placeholder="Eks: 1" value="1">

    <button type="button" class="save-btn" id="btnLagre" onclick="lagreFull()">LAGRE FULL REGISTRERING</button>
</div>

<script>
    var data = { t: "", k: "", a: "" };

    function velg(kat, verdi, el) {
        document.querySelectorAll('.' + kat + '-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        data[kat] = verdi;
        if (kat === 't') {
            document.getElementById('temaSection').style.display = (verdi === 'SAMTALE' ? 'block' : 'none');
        }
    }

    function hurtigLagre() {
        var sted = document.getElementById('bydel').value;
        if(confirm("Registrere tilstedeværelse i " + sted + " uten funn?")) {
            sendData(sted, "OPPSØKENDE UTE", "ENKEL", "0", "INGEN", "INGEN", []);
        }
    }

    function lagreFull() {
        if(!data.t || !data.k || !data.a) return alert("Vennligst fyll ut alle felt!");
        var sted = document.getElementById('bydel').value;
        var arena = document.getElementById('lokasjon').value;
        var ant = document.getElementById('antall').value || "1";
        
        // Hent valgte temaer hvis det er en samtale
        var temaer = [];
        if(data.t === 'SAMTALE') {
            var select = document.getElementById('temaValg');
            temaer = Array.from(select.selectedOptions).map(opt => opt.value);
        }
        
        sendData(sted, arena, data.t, ant, data.a, data.k, temaer);
    }

    function sendData(bydel, arena, type, antall, alder, kjonn, temaer) {
        var btn = document.getElementById('btnLagre');
        btn.disabled = true;
        btn.innerHTML = "SENDER...";
        
        // Din nye Form URL fra den nye kontoen
        var formURL = "https://docs.google.com/forms/d/e/1FAIpQLSeOi1N3cOL5qKiFpv-nczOc7obqEFHFLkQV4FnMOj0wZFk8Jw/formResponse";
        
        var params = new URLSearchParams();
        params.append("entry.842257148", bydel);
        params.append("entry.214146964", arena);
        params.append("entry.1473666377", type);
        params.append("entry.1346284831", antall);
        params.append("entry.1163056236", alder);
        params.append("entry.1511233883", kjonn);
        
        // Legg til hvert valgte tema (Google Forms tar imot flere verdier på samme ID for avhuking)
        if(temaer.length > 0) {
            temaer.forEach(t => {
                params.append("entry.1946658553", t);
            });
        }

        fetch(formURL, { method: "POST", mode: "no-cors", body: params.toString() })
        .then(() => {
            alert("Lagret i det nye skjemaet!");
            location.reload();
        }).catch(() => {
            alert("Feil ved lagring. Sjekk internettforbindelsen.");
            btn.disabled = false;
            btn.innerHTML = "LAGRE FULL REGISTRERING";
        });
    }
</script>
</body>
</html>
