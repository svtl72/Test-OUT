<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUT Drammen - Fullversjon</title>
    <style>
        :root { --primary: #2563eb; --success: #059669; --purple: #8b5cf6; --bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .kort { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        h1 { color: #1e3a8a; margin: 0; font-size: 24px; }
        label { font-weight: 700; display: block; margin: 15px 0 5px; font-size: 12px; color: #475569; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        /* Gjør det lettere å velge flere temaer på PC */
        select[multiple] { height: 180px; cursor: pointer; }
        .hint { font-size: 11px; color: #64748b; margin-top: 4px; font-style: italic; }
        .btn-quick { background: var(--purple); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #7c3aed; }
        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: #94a3b8; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px dashed #cbd5e1; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: #fff; border: 2px solid #e2e8f0; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; color: #475569; }
        .btn.active { background: var(--primary); color: white; border-color: #1e40af; }
        #temaSection { display: none; margin-top: 15px; padding: 15px; background: #f1f5f9; border-radius: 10px; border: 1px solid #e2e8f0; }
        .save-btn { background: var(--success); color: white; border: none; width: 100%; padding: 20px; border-radius: 14px; font-size: 18px; font-weight: 800; margin-top: 25px; cursor: pointer; }
        .save-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="kort">
    <div class="header"><h1>OUT Drammen 🚶‍♂️</h1></div>
    
    <label>1. Sted</label>
    <select id="bydel">
        <option value="Bragernes">Bragernes</option>
        <option value="Fjell">Fjell</option>
        <option value="Gulskogen">Gulskogen</option>
        <option value="Konnerud">Konnerud</option>
        <option value="Krogstadelva">Krogstadelva</option>
        <option value="Mjøndalen">Mjøndalen</option>
        <option value="Solbergelva">Solbergelva</option>
        <option value="Strømsø">Strømsø</option>
        <option value="Åskollen">Åskollen</option>
        <option value="Åssiden">Åssiden</option>
    </select>

    <button type="button" class="btn-quick" onclick="hurtigLagre()">📍 HURTIGREGISTRERING (Kun tilstedeværelse)</button>

    <div class="divider">ELLER FULL REGISTRERING</div>

    <label>Arena</label>
    <select id="lokasjon">
        <option value="OPPSØKENDE UTE">OPPSØKENDE UTE</option>
        <option value="G60">G60</option>
        <option value="FELLESVERKET">FELLESVERKET</option>
        <option value="NEON">NEON</option>
        <option value="DOWN UNDER">DOWN UNDER</option>
        <option value="UNDERGRUNN">UNDERGRUNN</option>
        <option value="SKATTEKAMMERET">SKATTEKAMMERET</option>
        <option value="NØSTEDHALLEN">NØSTEDHALLEN</option>
    </select>

    <label>Type treff</label>
    <div class="grid">
        <button type="button" class="btn t-btn" onclick="velg('t', 'TREFF', this)">TREFF</button>
        <button type="button" class="btn t-btn" onclick="velg('t', 'SAMTALE', this)">SAMTALE</button>
    </div>

    <div id="temaSection">
        <label>Tema</label>
        <div class="hint">Hold inne CTRL-tasten for å velge flere temaer</div>
        <select id="temaValg" multiple>
            <option value="Alkohol">Alkohol</option>
            <option value="Familie">Familie</option>
            <option value="Kriminalitet">Kriminalitet</option>
            <option value="Psykisk helse">Psykisk helse</option>
            <option value="Rusmidler">Rusmidler</option>
            <option value="Forhold">Forhold</option>
            <option value="Økonomi">Økonomi</option>
            <option value="Skole/Jobb">Skole/Jobb</option>
            <option value="Fritid">Fritid</option>
        </select>
    </div>

    <label>Kjønn</label>
    <div class="grid">
        <button type="button" class="btn k-btn" onclick="velg('k', 'GUTT', this)">GUTT</button>
        <button type="button" class="btn k-btn" onclick="velg('k', 'JENTE', this)">JENTE</button>
        <button type="button" class="btn k-btn" onclick="velg('k', 'ANNET', this)">ANNET</button>
    </div>

    <label>Alder</label>
    <div class="grid">
        <button type="button" class="btn a-btn" onclick="velg('a', 'B-SKOLE', this)">B-SKOLE</button>
        <button type="button" class="btn a-btn" onclick="velg('a', 'U-SKOLE', this)">U-SKOLE</button>
        <button type="button" class="btn a-btn" onclick="velg('a', 'VGS', this)">VGS</button>
        <button type="button" class="btn a-btn" onclick="velg('a', '20-25 ÅR', this)">20-25 ÅR</button>
    </div>

    <label>Antall ungdommer</label>
    <input type="number" id="antall" value="1" min="0">

    <button type="button" class="save-btn" id="btnLagre" onclick="lagreFull()">LAGRE REGISTRERING</button>
</div>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(sent){alert('Data er registrert i Google!'); location.reload();}"></iframe>

<script>
    var data = { t: "", k: "", a: "" };
    var sent = false;

    function velg(kat, verdi, el) {
        document.querySelectorAll('.' + kat + '-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        data[kat] = verdi;
        if (kat === 't') {
            document.getElementById('temaSection').style.display = (verdi === 'SAMTALE' ? 'block' : 'none');
        }
    }

    function hurtigLagre() {
        if(confirm("Registrere tilstedeværelse uten funn?")) {
            sendTilGoogle(document.getElementById('bydel').value, "OPPSØKENDE UTE", "TREFF", "0", "INGEN", "INGEN", []);
        }
    }

    function lagreFull() {
        if(!data.t || !data.k || !data.a) return alert("Vennligst velg både Type, Kjønn og Alder!");
        
        var temaer = [];
        if(data.t === 'SAMTALE') {
            var select = document.getElementById('temaValg');
            temaer = Array.from(select.selectedOptions).map(opt => opt.value);
            if(temaer.length === 0) return alert("Vennligst velg minst ett tema for samtale!");
        }

        sendTilGoogle(
            document.getElementById('bydel').value,
            document.getElementById('lokasjon').value,
            data.t,
            document.getElementById('antall').value,
            data.a,
            data.k,
            temaer
        );
    }

    function sendTilGoogle(bydel, arena, type, antall, alder, kjonn, temaer) {
        sent = true;
        document.getElementById('btnLagre').disabled = true;
        document.getElementById('btnLagre').innerHTML = "SENDER...";

        var form = document.createElement('form');
        form.method = 'POST';
        form.action = 'https://docs.google.com/forms/d/e/1FAIpQLSeOi1N3cOL5qKiFpv-nczOc7obqEFHFLkQV4FnMOj0wZFk8Jw/formResponse';
        form.target = 'hidden_iframe';

        // Definer alle feltene basert på de NYE ID-ene fra lenken din
        var fields = {
            "entry.842257148": bydel,
            "entry.214146964": arena,
            "entry.1473666377": type,
            "entry.1346284831": antall,
            "entry.1163056236": alder,
            "entry.1511233883": kjonn
        };

        // Legg til standardfeltene
        for (var key in fields) {
            var input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = fields[key];
            form.appendChild(input);
        }

        // Legg til TEMA (viktig: samme ID brukes flere ganger for avhukingsbokser)
        temaer.forEach(function(t) {
            var input = document.createElement('input');
            input.type = 'hidden';
            input.name = "entry.1946658553";
            input.value = t;
            form.appendChild(input);
        });

        document.body.appendChild(form);
        form.submit();
    }
</script>

</body>
</html>
