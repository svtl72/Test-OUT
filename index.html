<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OUT Drammen</title>
    <style>
        :root { --primary: #2563eb; --success: #059669; --purple: #8b5cf6; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .kort { width: 100%; max-width: 400px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; }
        h1 { color: #1e3a8a; font-size: 28px; margin: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        label { font-weight: 700; display: block; margin: 20px 0 8px; font-size: 11px; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input[type="text"] { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; background: #fff; }
        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: #94a3b8; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px dashed #cbd5e1; }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }
        .btn-quick { background: var(--purple); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 15px; box-shadow: 0 4px 0 #7c3aed; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        .btn { background: #fff; border: 2px solid #e2e8f0; padding: 14px 5px; border-radius: 12px; font-weight: 700; color: #475569; font-size: 12px; cursor: pointer; }
        .btn.active { background-color: #f1f5f9 !important; border-color: var(--primary) !important; color: var(--primary) !important; box-shadow: inset 0 0 0 1px var(--primary); }
        .save-btn { background: var(--success); color: white; border: none; width: 100%; padding: 18px; border-radius: 14px; font-size: 16px; font-weight: 800; margin-top: 30px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="kort">
    <div class="header">
        <h1>OUT Drammen 🚶‍♂️</h1>
    </div>
    
    <label>1. VELG STED</label>
    <select id="bydel">
        <option value="Bragernes">Bragernes</option>
        <option value="Fjell">Fjell</option>
        <option value="Gulskogen">Gulskogen</option>
        <option value="Konnerud">Konnerud</option>
        <option value="Krogstadelva">Krogstadelva</option>
        <option value="Mjøndalen">Mjøndalen</option>
        <option value="Solbergelva">Solbergelva</option>
        <option value="Strømsø">Strømsø</option>
        <option value="Åskollen">Åskollen</option>
        <option value="Åssiden">Åssiden</option>
    </select>

    <div style="margin-top: 15px;">
        <button type="button" class="btn-quick" onclick="hurtigLagre()">📍 TILSTEDEVÆRELSE I OMRÅDET</button>
    </div>

    <div class="divider">ELLER FULL REGISTRERING</div>

    <label>ARENA / UNGDOMSKLUBB</label>
    <select id="lokasjon">
        <option value="OPPSØKENDE UTE">OPPSØKENDE UTE</option>
        <option value="G60">G60</option>
        <option value="FELLESVERKET">FELLESVERKET</option>
        <option value="NEON">NEON</option>
        <option value="DOWN UNDER">DOWN UNDER</option>
        <option value="UNDERGRUNN">UNDERGRUNN</option>
        <option value="SKATTEKAMMERET">SKATTEKAMMERET</option>
        <option value="NØSTEDHALLEN">NØSTEDHALLEN</option>
    </select>

    <label>TYPE TREFF</label>
    <div class="grid">
        <button type="button" class="btn t-btn" onclick="velg('t', 'TREFF', this)">TREFF</button>
        <button type="button" class="btn t-btn" onclick="velg('t', 'SAMTALE', this)">SAMTALE</button>
    </div>

    <label>KJØNN</label>
    <div class="grid grid-3">
        <button type="button" class="btn k-btn" onclick="velg('k', 'JENTE', this)">JENTE</button>
        <button type="button" class="btn k-btn" onclick="velg('k', 'GUTT', this)">GUTT</button>
        <button type="button" class="btn k-btn" onclick="velg('k', 'ANNET', this)">ANNET</button>
    </div>

    <label>ALDER</label>
    <div class="grid grid-3">
        <button type="button" class="btn a-btn" onclick="velg('a', 'B-SKOLE', this)">B-SKOLE</button>
        <button type="button" class="btn a-btn" onclick="velg('a', 'U-SKOLE', this)">U-SKOLE</button>
        <button type="button" class="btn a-btn" onclick="velg('a', 'VGS', this)">VGS</button>
    </div>
    <div style="margin-top:8px">
        <button type="button" class="btn a-btn" style="width:100%" onclick="velg('a', '20-25 ÅR', this)">20-25 ÅR</button>
    </div>

    <label>ANTALL UNGDOMMER</label>
    <input type="text" id="antall" placeholder="Eks: 5">

    <button type="button" class="save-btn" id="btnLagre" onclick="lagreFull()">LAGRE FULL REGISTRERING</button>
</div>

<script>
    var valgt = { t: "", k: "", a: "" };

    function velg(kat, verdi, el) {
        document.querySelectorAll('.' + kat + '-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        valgt[kat] = verdi;
    }

    function hurtigLagre() {
        if(confirm("Registrere tilstedeværelse i " + document.getElementById('bydel').value + " uten funn?")) {
            sendData("ENKEL", "0", "INGEN", "INGEN", "OPPSØKENDE UTE");
        }
    }

    function lagreFull() {
        if(!valgt.t || !valgt.k || !valgt.a) return alert("Vennligst fyll ut alle felt!");
        var ant = document.getElementById('antall').value || "1";
        sendData(valgt.t, ant, valgt.a, valgt.k, document.getElementById('lokasjon').value);
    }

    function sendData(treff, antall, alder, kjonn, arena) {
        var btn = document.getElementById('btnLagre');
        btn.disabled = true;
        btn.innerHTML = "SENDER...";

        var formURL = "https://docs.google.com/forms/d/e/1FAIpQLScEs6BU3u2dsdpIkwnu6SwVhwKWfW-oH97LnYGUvZtHEb4y3Q/formResponse";
        var params = new URLSearchParams();
        params.append("entry.842257148", document.getElementById('bydel').value);
        params.append("entry.214146964", arena);
        params.append("entry.1473666377", treff);
        params.append("entry.1346284831", antall);
        params.append("entry.1163056236", alder);
        params.append("entry.1511233883", kjonn);

        fetch(formURL, { method: "POST", mode: "no-cors", body: params.toString() })
        .then(() => {
            alert("Lagret! Bra jobba.");
            location.reload();
        }).catch(() => {
            alert("Noe gikk galt.");
            btn.disabled = false;
            btn.innerHTML = "LAGRE FULL REGISTRERING";
        });
    }
</script>
</body>
</html>
